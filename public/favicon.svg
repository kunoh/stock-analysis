<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>

  <!-- Candlestick chart -->
  <!-- Candle 1 (bearish, red) -->
  <line x1="7" y1="6" x2="7" y2="10" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="5" y="10" width="4" height="7" rx="0.5" fill="#ef4444"/>
  <line x1="7" y1="17" x2="7" y2="22" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Candle 2 (bullish, green) -->
  <line x1="14" y1="8" x2="14" y2="12" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="12" y="12" width="4" height="8" rx="0.5" fill="#22c55e"/>
  <line x1="14" y1="20" x2="14" y2="25" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Candle 3 (bearish, red) -->
  <line x1="21" y1="5" x2="21" y2="9" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="19" y="9" width="4" height="6" rx="0.5" fill="#ef4444"/>
  <line x1="21" y1="15" x2="21" y2="19" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Candle 4 (bullish, green) -->
  <line x1="28" y1="7" x2="28" y2="11" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="26" y="11" width="4" height="10" rx="0.5" fill="#22c55e"/>
  <line x1="28" y1="21" x2="28" y2="26" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
</svg>
